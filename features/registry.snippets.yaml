snippets:

  # — Navigation & Layout —
  - id: c-product-accordion
    title: Product Accordion
    description: Collapsible panels for How To Use, Ingredients, and Quality & Certifications within the product hero.
    status: not-started

  - id: c-social-links
    title: Social Icons
    description: Row of social platform icon links (Instagram, Facebook, YouTube).
    status: planned
    file: components/c-social-links.md

  - id: c-pagination
    title: Pagination
    description: Dot or arrow controls for navigating between pages of a list or carousel.
    status: not-started

  # — Product —
  - id: c-product-card
    title: Product Card
    description: Product tile with image, badge, rating, title, price, swatches, and optional CTA.
    status: planned
    file: components/c-product-card.md

  - id: c-image-gallery
    title: Image Gallery
    description: Primary product image with thumbnail strip; swipeable carousel on mobile.
    status: not-started

  - id: c-swatch
    title: Variant Swatches
    description: Color or flavor dot selector that updates the displayed variant.
    status: planned
    file: components/c-swatch.md

  - id: c-buy-box
    title: Buy Box
    description: Quantity selector, price display, and Add to Cart CTA button.
    status: not-started

  - id: c-subscribe-save
    title: Subscribe & Save Toggle
    description: One-time vs. subscription purchase toggle with discount callout.
    status: not-started

  - id: c-ratings
    title: Star Rating
    description: Star display with numeric rating and review count; supports Judgeme and Yotpo.
    status: done
    file: components/c-ratings.md

  - id: c-icon-item
    title: Icon Item
    description: Single icon + label pair used in rows. Covers symptom icons, trust badges, and press logos.
    status: not-started

  - id: c-ingredient-card
    title: Ingredient Card
    description: Single ingredient tile with image, name, and short benefit description.
    status: not-started

  - id: c-stat
    title: Stat Block
    description: Large percentage or number with a short descriptor label below.
    status: planned
    file: components/c-stat.md

  - id: c-routine-step
    title: Routine Step Card
    description: Numbered step card with a full-bleed image and short instructional copy.
    status: not-started

  # — Reviews —
  - id: c-review-card
    title: Review Card
    description: Individual review with reviewer name, star rating, date, body text, and verified badge.
    status: not-started

  - id: c-rating-summary
    title: Rating Summary Bar
    description: Aggregate score, histogram breakdown, and Write a Review CTA.
    status: not-started

  # — Bundles —
  - id: c-bundle-item
    title: Bundle Card
    description: Bundle tile with product image, name, included items summary, and price.
    status: planned
    file: components/c-bundle-item.md

  - id: c-bundle-product-block
    title: Bundle Product Block
    description: Expanded product block within a bundle showing benefits, usage, and key ingredients.
    status: not-started

  # — Blog & Editorial —
  - id: c-article-card
    title: Article Card
    description: Article preview tile with cover image, category tag, read time, and title.
    status: not-started

  - id: c-badge
    title: Badge
    description: Small pill label for status or category (e.g. Featured, Bestseller, % Off).
    status: planned
    file: components/c-badge.md

  - id: c-category-tag
    title: Category Tag
    description: Outlined pill label identifying the product or content category.
    status: not-started

  - id: c-inline-product-card
    title: Inline Product Card
    description: Mid-article product recommendation with image, rating, price, and Add to Cart.
    status: not-started

  - id: c-pull-quote
    title: Pull Quote Block
    description: Styled large-format quote with attribution name and title.
    status: not-started

  - id: c-editorial-card
    title: Editorial / Promo Card
    description: Full-bleed image card with headline overlay and CTA, inserted inline in a grid.
    status: not-started

  # — Filtering & Sorting —
  - id: c-filter-sort
    title: Filter + Sort Bar
    description: Row of category filter pills and a sort dropdown for controlling a product grid.
    status: not-started
    sections:
      - s-plp-grid

  - id: c-show-more
    title: Show More
    description: Centered button that loads additional items into the grid.
    status: not-started
    sections:
      - s-plp-grid

  - id: c-filter-tab
    title: Filter Tab
    description: Tab-style selector for switching between product category sets.
    status: not-started

  # — Social Proof & Community —
  - id: c-person
    title: Person Card
    description: Headshot photo with name, credential, and optional short quote.
    status: planned
    file: components/c-person.md

  - id: c-ugc-tile
    title: UGC Photo Tile
    description: Single user-generated photo tile linking to the social profile.
    status: not-started

  - id: c-resource-card
    title: Resource Card
    description: Editorial card with full-bleed image, title overlay, and a CTA button.
    status: not-started

  # — FAQ —
  - id: c-faq-item
    title: Accordion Item
    description: Expandable row with a question header and collapsible answer body.
    status: planned
    file: components/c-faq-item.md

  - id: c-faq-category-nav
    title: FAQ Category Nav
    description: Vertical sidebar (desktop) or horizontal tab strip (mobile) for filtering FAQ by category.
    status: not-started

  # — Footer —
  - id: c-footer-nav-column
    title: Footer Nav Column
    description: Grouped set of footer links under a category label; collapses to accordion on mobile.
    status: not-started
    sections:
      - s-footer

  - id: c-email-signup
    title: Newsletter Signup Form
    description: Email input and submit button for newsletter or waitlist signup.
    status: planned
    file: components/c-email-signup.md
    sections:
      - s-footer
