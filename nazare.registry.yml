version: 1
components:
  build-vite:
    kind: tooling
    package:
      scripts:
        build: vite build
        registry: node tooling/registry.mjs
        watch: vite build --watch --emptyOutDir=false
      dependencies:
        reefjs: ^13.0.6
      devDependencies:
        "@tailwindcss/vite": ^4.0.0
        tailwindcss: ^4.0.0
        vite: ^6.0.0
        yaml: ^2.9.0
    files:
      - vite.config.js
      - tooling/registry.mjs
  core:
    kind: core
    dependencies:
      - build-vite
    css:
      mode: generated
      entry: styles/base.css
      output: assets/base.css
      load: normal
      sources:
        - layout/**/*.liquid
        - templates/**/*.json
        - blocks/**/*.liquid
    files:
      - scripts/theme.js
  c-button:
    kind: snippet
    files:
      - snippets/c-button.liquid
  c-video:
    kind: snippet
    files:
      - snippets/c-video.liquid
  c-marquee:
    kind: snippet
    files:
      - snippets/c-marquee.liquid
      - scripts/c-marquee.js
  s-announcement:
    kind: section
    dependencies:
      - core
    css:
      mode: generated
      entry: styles/s-announcement.css
      output: assets/s-announcement.css
      load: preload
      sources:
        - sections/s-announcement.liquid
    files:
      - sections/s-announcement.liquid
  s-hero:
    kind: section
    dependencies:
      - core
      - c-button
      - c-video
    css:
      mode: generated
      entry: styles/s-hero.css
      output: assets/s-hero.css
      load: preload
      sources:
        - sections/s-hero.liquid
        - snippets/c-button.liquid
        - snippets/c-video.liquid
    files:
      - sections/s-hero.liquid
  s-social-video-gallery:
    kind: section
    dependencies:
      - core
      - c-button
      - c-video
      - c-marquee
    css:
      mode: generated
      entry: styles/s-social-video-gallery.css
      output: assets/s-social-video-gallery.css
      load: normal
      sources:
        - sections/s-social-video-gallery.liquid
        - snippets/c-button.liquid
        - snippets/c-marquee.liquid
        - snippets/c-video.liquid
    files:
      - sections/s-social-video-gallery.liquid
