version: 1
components:
  core:
    kind: core
    css:
      mode: generated
      entry: styles/base.css
      output: assets/base.css
      load: normal
      sources:
        - layout/**/*.liquid
        - templates/**/*.json
        - blocks/**/*.liquid
    js:
      imports:
        - ./core.js
    files:
      - from: components/scripts/core.js
        to: scripts/core.js
      - from: templates/default/snippets/custom-fonts.liquid
        to: snippets/custom-fonts.liquid
      - from: templates/default/snippets/css-variables.liquid
        to: snippets/css-variables.liquid
      - from: templates/default/snippets/meta-tags.liquid
        to: snippets/meta-tags.liquid
      - from: templates/default/snippets/image.liquid
        to: snippets/image.liquid
      - from: templates/default/assets/critical.css
        to: assets/critical.css
      - from: templates/default/assets/inter-variable.woff2
        to: assets/inter-variable.woff2
      - from: templates/default/assets/inter-variable-italic.woff2
        to: assets/inter-variable-italic.woff2
  c-button:
    kind: snippet
    files:
      - from: components/snippets/c-button.liquid
        to: snippets/c-button.liquid
  c-video:
    kind: snippet
    files:
      - from: components/snippets/c-video.liquid
        to: snippets/c-video.liquid
  c-marquee:
    kind: snippet
    js:
      initializers:
        - import: ./c-marquee.js
          name: initCMarquees
    files:
      - from: components/snippets/c-marquee.liquid
        to: snippets/c-marquee.liquid
      - from: components/scripts/c-marquee.js
        to: scripts/c-marquee.js
  s-announcement:
    kind: section
    dependencies:
      - core
    css:
      mode: generated
      entry: styles/s-announcement.css
      output: assets/s-announcement.css
      load: preload
      sources:
        - sections/s-announcement.liquid
    files:
      - from: components/sections/s-announcement.liquid
        to: sections/s-announcement.liquid
  s-hero:
    kind: section
    dependencies:
      - core
      - c-button
      - c-video
    css:
      mode: generated
      entry: styles/s-hero.css
      output: assets/s-hero.css
      load: preload
      sources:
        - sections/s-hero.liquid
        - snippets/c-button.liquid
        - snippets/c-video.liquid
    files:
      - from: components/sections/s-hero.liquid
        to: sections/s-hero.liquid
  s-social-video-gallery:
    kind: section
    dependencies:
      - core
      - c-button
      - c-video
      - c-marquee
    css:
      mode: generated
      entry: styles/s-social-video-gallery.css
      output: assets/s-social-video-gallery.css
      load: normal
      sources:
        - sections/s-social-video-gallery.liquid
        - snippets/c-button.liquid
        - snippets/c-marquee.liquid
        - snippets/c-video.liquid
    files:
      - from: components/sections/s-social-video-gallery.liquid
        to: sections/s-social-video-gallery.liquid
